<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="StreamVault — A premium, browser-based IPTV player with thousands of live channels from around the world. Watch free live TV streams instantly.">
  <title>StreamVault — Live IPTV Player</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="index.css">
</head>
<body>
  <!-- Loading Overlay -->
  <div id="loading-overlay" class="loading-overlay">
    <div class="loader-container">
      <div class="loader-ring">
        <div></div><div></div><div></div><div></div>
      </div>
      <p class="loader-text">Loading channels…</p>
      <p class="loader-subtext" id="loader-status">Fetching playlist</p>
    </div>
  </div>

  <!-- Main App -->
  <div id="app" class="app hidden">

    <!-- Sidebar -->
    <aside id="sidebar" class="sidebar">
      <div class="sidebar-header">
        <div class="logo">
          <svg class="logo-icon" viewBox="0 0 32 32" fill="none">
            <rect x="2" y="4" width="28" height="20" rx="3" stroke="url(#logoGrad)" stroke-width="2.5"/>
            <path d="M13 10l8 4.5-8 4.5V10z" fill="url(#logoGrad)"/>
            <line x1="10" y1="28" x2="22" y2="28" stroke="url(#logoGrad)" stroke-width="2.5" stroke-linecap="round"/>
            <line x1="16" y1="24" x2="16" y2="28" stroke="url(#logoGrad)" stroke-width="2.5"/>
            <defs>
              <linearGradient id="logoGrad" x1="0" y1="0" x2="32" y2="32">
                <stop offset="0%" stop-color="#6C5CE7"/>
                <stop offset="100%" stop-color="#a29bfe"/>
              </linearGradient>
            </defs>
          </svg>
          <span class="logo-text">StreamVault</span>
        </div>
        <button id="sidebar-toggle" class="sidebar-toggle" aria-label="Toggle sidebar">
          <svg width="20" height="20" viewBox="0 0 20 20" fill="currentColor">
            <rect y="3" width="20" height="2" rx="1"/>
            <rect y="9" width="20" height="2" rx="1"/>
            <rect y="15" width="20" height="2" rx="1"/>
          </svg>
        </button>
      </div>

      <!-- Search -->
      <div class="search-container">
        <svg class="search-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
        </svg>
        <input type="text" id="search-input" class="search-input" placeholder="Search channels…" autocomplete="off">
        <button id="search-clear" class="search-clear hidden" aria-label="Clear search">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>

      <!-- Category Tabs -->
      <div class="category-tabs">
        <button class="category-tab active" data-category="all" id="tab-all">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
          All
        </button>
        <button class="category-tab" data-category="favorites" id="tab-favorites">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
          Favorites
        </button>
      </div>

      <!-- Category Filter Dropdown -->
      <div class="category-filter-wrap">
        <select id="category-select" class="category-select">
          <option value="all">All Categories</option>
        </select>
      </div>

      <!-- Channel List -->
      <div id="channel-list" class="channel-list">
        <!-- Channels rendered here dynamically -->
      </div>

      <!-- Channel Count -->
      <div class="channel-count">
        <span id="channel-count-text">0 channels</span>
      </div>
    </aside>

    <!-- Main Content -->
    <main class="main-content">
      <!-- Top Bar -->
      <header class="top-bar">
        <button id="mobile-menu-btn" class="mobile-menu-btn" aria-label="Open channel list">
          <svg width="22" height="22" viewBox="0 0 20 20" fill="currentColor">
            <rect y="3" width="20" height="2" rx="1"/>
            <rect y="9" width="20" height="2" rx="1"/>
            <rect y="15" width="20" height="2" rx="1"/>
          </svg>
        </button>
        <div class="now-playing" id="now-playing">
          <span class="now-playing-label">NOW PLAYING</span>
          <span class="now-playing-name" id="now-playing-name">Select a channel</span>
        </div>
        <div class="top-bar-actions">
          <button id="pip-btn" class="icon-btn" aria-label="Picture in Picture" title="Picture in Picture">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="3" width="20" height="14" rx="2"/><rect x="12" y="9" width="8" height="6" rx="1" fill="currentColor" opacity=".3"/></svg>
          </button>
          <button id="fullscreen-btn" class="icon-btn" aria-label="Fullscreen" title="Fullscreen">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 3 21 3 21 9"/><polyline points="9 21 3 21 3 15"/><line x1="21" y1="3" x2="14" y2="10"/><line x1="3" y1="21" x2="10" y2="14"/></svg>
          </button>
        </div>
      </header>

      <!-- Player Area -->
      <div class="player-wrapper" id="player-wrapper">
        <!-- Idle State -->
        <div class="player-idle" id="player-idle">
          <div class="idle-content">
            <svg class="idle-icon" viewBox="0 0 80 80" fill="none">
              <circle cx="40" cy="40" r="38" stroke="url(#idleGrad)" stroke-width="2" opacity=".4"/>
              <circle cx="40" cy="40" r="28" stroke="url(#idleGrad)" stroke-width="2" opacity=".2"/>
              <path d="M33 26l20 14-20 14V26z" fill="url(#idleGrad)"/>
              <defs>
                <linearGradient id="idleGrad" x1="0" y1="0" x2="80" y2="80">
                  <stop offset="0%" stop-color="#6C5CE7"/>
                  <stop offset="100%" stop-color="#a29bfe"/>
                </linearGradient>
              </defs>
            </svg>
            <h2 class="idle-title">Ready to Stream</h2>
            <p class="idle-subtitle">Choose a channel from the sidebar to start watching</p>
          </div>
        </div>

        <!-- Video Player -->
        <video id="video-player" class="video-player hidden" autoplay></video>

        <!-- Buffering Overlay -->
        <div id="buffering-overlay" class="buffering-overlay hidden">
          <div class="buffering-spinner"></div>
        </div>

        <!-- Error Overlay -->
        <div id="error-overlay" class="error-overlay hidden">
          <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#ff6b6b" stroke-width="1.5"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>
          <p class="error-text" id="error-text">Stream unavailable</p>
          <button class="retry-btn" id="retry-btn">Retry</button>
        </div>

        <!-- Player Controls Overlay -->
        <div class="player-controls" id="player-controls">
          <div class="controls-left">
            <button id="play-pause-btn" class="control-btn" aria-label="Play/Pause">
              <svg id="play-icon" width="22" height="22" viewBox="0 0 24 24" fill="currentColor"><polygon points="5,3 19,12 5,21"/></svg>
              <svg id="pause-icon" width="22" height="22" viewBox="0 0 24 24" fill="currentColor" class="hidden"><rect x="6" y="4" width="4" height="16" rx="1"/><rect x="14" y="4" width="4" height="16" rx="1"/></svg>
            </button>
            <button id="mute-btn" class="control-btn" aria-label="Mute/Unmute">
              <svg id="volume-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="11,5 6,9 2,9 2,15 6,15 11,19" fill="currentColor"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/></svg>
              <svg id="muted-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="hidden"><polygon points="11,5 6,9 2,9 2,15 6,15 11,19" fill="currentColor"/><line x1="23" y1="9" x2="17" y2="15"/><line x1="17" y1="9" x2="23" y2="15"/></svg>
            </button>
            <input type="range" id="volume-slider" class="volume-slider" min="0" max="1" step="0.01" value="0.8">
          </div>
          <div class="controls-right">
            <span class="live-badge" id="live-badge">● LIVE</span>
            <button id="fs-control-btn" class="control-btn" aria-label="Toggle fullscreen">
              <svg id="fs-enter-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 3 21 3 21 9"/><polyline points="9 21 3 21 3 15"/><line x1="21" y1="3" x2="14" y2="10"/><line x1="3" y1="21" x2="10" y2="14"/></svg>
              <svg id="fs-exit-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="hidden"><polyline points="4 14 10 14 10 20"/><polyline points="20 10 14 10 14 4"/><line x1="14" y1="10" x2="21" y2="3"/><line x1="3" y1="21" x2="10" y2="14"/></svg>
            </button>
          </div>
        </div>
      </div>

      <!-- Channel Info Bar -->
      <div class="channel-info-bar" id="channel-info-bar">
        <div class="channel-info-inner">
          <img id="channel-logo-large" class="channel-logo-large" src="" alt="" loading="lazy">
          <div class="channel-meta">
            <h1 id="channel-name-display" class="channel-name-display">—</h1>
            <div class="channel-tags" id="channel-tags"></div>
          </div>
          <button id="fav-btn-main" class="fav-btn-main" aria-label="Toggle favorite">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
          </button>
        </div>
      </div>
    </main>
  </div>

  <!-- Mobile Overlay -->
  <div id="mobile-overlay" class="mobile-overlay hidden"></div>

  <script src="https://cdn.jsdelivr.net/npm/hls.js@1.5.17/dist/hls.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
